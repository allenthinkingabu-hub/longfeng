name: ci

on:
  push:
    branches: [ main, "feature/**", "release/**", "hotfix/**" ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 落地计划 §1.6 规则 C · 白名单硬门禁
  allowlist-check:
    name: allowlist-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
      - name: Run check-allowlist.sh all-phases
        run: bash ops/scripts/check-allowlist.sh all-phases

  # 占位：落地计划 §1.7 规则 E · 架构一致性（后续 Phase 激活）
  arch-consistency-check:
    name: arch-consistency-check
    runs-on: ubuntu-latest
    needs: [ allowlist-check ]
    steps:
      - uses: actions/checkout@v4
      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
      - name: Run check-arch-consistency.sh s0 (exempt)
        run: bash ops/scripts/check-arch-consistency.sh s0

  # 占位 · S2 补齐完整后端 CI（单测 · 契约 · SAST · 覆盖率）
  backend-ci:
    name: backend-ci (skeleton build)
    runs-on: ubuntu-latest
    needs: [ allowlist-check ]
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build backend skeleton
        working-directory: backend
        run: mvn -q -B -T 1C -DskipTests package

  # 占位 · S6 补齐前端 CI（lint + test + build + 覆盖率）
  frontend-ci:
    name: frontend-ci (skeleton build)
    runs-on: ubuntu-latest
    needs: [ allowlist-check ]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
      - name: Install deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Build
        working-directory: frontend
        run: pnpm -r build
