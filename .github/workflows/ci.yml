name: ci

on:
  push:
    branches: [ main, "feature/**", "release/**", "hotfix/**" ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 落地计划 §1.6 规则 C · 白名单硬门禁
  allowlist-check:
    name: allowlist-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
      - name: Run check-allowlist.sh all-phases
        run: bash ops/scripts/check-allowlist.sh all-phases

  # 落地计划 §1.7 规则 E · 架构一致性（S3+ 激活符号对齐）
  arch-consistency-check:
    name: arch-consistency-check
    runs-on: ubuntu-latest
    needs: [ allowlist-check ]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
      - name: arch-consistency · s0 (exempt)
        run: bash ops/scripts/check-arch-consistency.sh s0
      - name: arch-consistency · s1 (exempt)
        run: bash ops/scripts/check-arch-consistency.sh s1
      - name: arch-consistency · s2 (exempt)
        run: bash ops/scripts/check-arch-consistency.sh s2
      - name: arch-consistency · s3 (strict · diff vs s2-done)
        env:
          DIFF_BASE: s2-done
        run: bash ops/scripts/check-arch-consistency.sh s3

  # 落地计划 §6.7 §7.7 · 后端 CI（S2 骨架 + S3 wrongbook-service 全绿）
  backend-ci:
    needs: [ allowlist-check ]
    name: backend-ci
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: wrongbook
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: wb
        ports: [ '15432:5432' ]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 3s --health-retries 10
      redis:
        image: redis:7.2-alpine
        ports: [ '16379:6379' ]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Backend S2 smoke (SmokeIT + RouteIT)
        working-directory: backend
        run: mvn -q -B -T 1C -pl gateway,ai-analysis-service,review-plan-service,file-service,anonymous-service -am verify -Dtest='*SmokeIT,*RouteIT' -Dsurefire.failIfNoSpecifiedTests=false
      - name: Enable pgvector on test DB
        run: |
          docker exec $(docker ps -qf "ancestor=pgvector/pgvector:pg16") \
            psql -U postgres -d wrongbook -c "CREATE EXTENSION IF NOT EXISTS vector;"
      - name: Backend S3 full verify (wrongbook-service)
        working-directory: backend
        run: mvn -q -B -pl wrongbook-service -am verify
      - name: S3 allowlist
        run: bash ops/scripts/check-allowlist.sh s3

  # 占位 · S6 补齐前端 CI（lint + test + build + 覆盖率）
  frontend-ci:
    name: frontend-ci (skeleton build)
    runs-on: ubuntu-latest
    needs: [ allowlist-check ]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
      - name: Install deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Build
        working-directory: frontend
        run: pnpm -r build
