# review-plan-service · 落地计划 §9.7
server:
  port: 8083

spring:
  application:
    name: review-plan-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/wrongbook}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:wb}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: false
    locations: classpath:db/migration

# SM-2 算法 guard-rail · §9.7 Step 2 · Q-C/F 决策 · Nacos 可动态下发
review:
  sm2:
    ease-min: 1.3
    ease-max: 3.0          # 放宽到 3.0 给 Q-G "ease≥2.8 mastered" 留上探空间（SM-2 论文默认范围 · 无严格上限）
    ease-init: 2.5
    interval-max-days: 60
    quality-penalty-step: 0.2
  mq:
    enabled: false                # IT 测试默认关 · 生产 override 为 true

# Feign + Sentinel · SC-10.AC-1
feign:
  sentinel:
    enabled: true

calendar:
  core-service:
    url: ${CALENDAR_URL:http://localhost:18080}

# Springdoc OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# Observability
management:
  endpoints:
    web:
      exposure:
        include: [health, info, prometheus]
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: review-plan-service

snowflake:
  worker-id: 3
