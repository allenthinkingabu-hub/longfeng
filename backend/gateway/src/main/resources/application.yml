# Gateway · Spring Cloud Gateway 4.1 · 落地计划 §6.7 Step 8
server:
  port: 8080

spring:
  application:
    name: gateway
  main:
    web-application-type: reactive
  cloud:
    gateway:
      routes:
        - id: wrongbook-api
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/wrongbook/**
        - id: ai-api
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/ai/**
        - id: review-api
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/review/**
        - id: file-api
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/file/**
        - id: anon-api
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/anon/**

resilience4j:
  ratelimiter:
    configs:
      default:
        limitForPeriod: 20
        limitRefreshPeriod: 1s
        timeoutDuration: 0

management:
  endpoints:
    web:
      exposure:
        include: [health, info]

jwt:
  public-key-path: ${JWT_PUBLIC_KEY_PATH:docs/dev/jwt-dev-pubkey.pem}
