# Gateway test profile · overrides for SmokeIT/RouteIT
server:
  port: 0

spring:
  application:
    name: gateway
  main:
    web-application-type: reactive
  cloud:
    gateway:
      routes:
        - id: wrongbook-api
          uri: http://localhost:18081
          predicates:
            - Path=/api/v1/wrongbook/**
        - id: ai-api
          uri: http://localhost:18082
          predicates:
            - Path=/api/v1/ai/**
        - id: review-api
          uri: http://localhost:18083
          predicates:
            - Path=/api/v1/review/**
        - id: file-api
          uri: http://localhost:18084
          predicates:
            - Path=/api/v1/file/**
        - id: anon-api
          uri: http://localhost:18085
          predicates:
            - Path=/api/v1/anon/**

management:
  endpoints:
    web:
      exposure:
        include: [health, info]

jwt:
  # classpath-relative PEM (copied from docs/dev at build time); RouteIT overrides via @DynamicPropertySource
  public-key-path: jwt-dev-pubkey.pem

resilience4j:
  ratelimiter:
    configs:
      default:
        limitForPeriod: 5
        limitRefreshPeriod: 1s
        timeoutDuration: 0
