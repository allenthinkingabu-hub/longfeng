# file-service · 落地计划 §6.7 Step 11
server:
  port: 8084

spring:
  application:
    name: file-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/file_service}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: [health, info, prometheus]
  endpoint:
    health:
      probes:
        enabled: true
