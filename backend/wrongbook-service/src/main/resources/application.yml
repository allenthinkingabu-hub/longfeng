# wrongbook-service · 落地计划 §7.7 · S3 configuration
server:
  port: 8081

spring:
  application:
    name: wrongbook-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/wrongbook}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:wb}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        jdbc.time_zone: UTC
        format_sql: false
        order_inserts: true
        order_updates: true
  flyway:
    enabled: true
    baseline-on-migrate: false
    out-of-order: true           # S3 新增 V1.0.019..022 在 V1.0.052 之后回填 · 允许 OoO
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 200ms

rocketmq:
  name-server: ${ROCKETMQ_NAMESRV:localhost:9876}
  producer:
    group: wrongbook-producer
    send-message-timeout: 3000
    retry-times-when-send-failed: 2

snowflake:
  worker-id: ${SNOWFLAKE_WORKER_ID:1}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: [health, info, prometheus]
  endpoint:
    health:
      probes:
        enabled: true
