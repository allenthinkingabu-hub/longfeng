  # ============ S5.5 跨服务 AC · S4 owner（AI 解析）· 2026-04-24 AI 代拟 ============
  - sc_id: SC-05
    title: "AI 错题解析（文字+图像）"
    phase_owner: s4
    acceptance:
      - id: SC-05.AC-1
        statement: "用户拍照入库（POST /wrongbook/items 含 image_ref）后 · 3 秒内 S4 AI 解析完成并产出 wrongbook.item.analyzed 事件 · GET /ai/analysis/{itemId} 返 status=completed"
        oracle_type: functional+performance
        threshold: "happy_path: POST wrongbook/items 返 201 · T+3s 内 GET /ai/analysis/{itemId}.status=completed · wrongbook.item.analyzed 事件在 outbox 或 MQ 可观察。error: item 不存在 → GET 返 404。boundary: AI 超时 > 3s → status=timeout + 降级占位卡片（触发 SC-06.AC-1）。性能: 100 次调用 · P95 end-to-end < 3000ms。"
        source: "落地计划 §10.5.1（2026-04-24 编号修正 · 原误为 SC-01.AC-3）· 方案 §2A.5 拍照流 · §2B.SC-05"
        draft_by: ai-planner-s5.5
        draft_at: "2026-04-24T07:25:00+08:00"

  - sc_id: SC-06
    title: "AI 解析失败降级与重试"
    phase_owner: s4
    acceptance:
      - id: SC-06.AC-1
        statement: "LLM provider（dashscope/openai）返 429 quota_exceeded 或 5xx 或超时 · S4 自动切备用 provider · 最终失败降级占位卡片（subject=unknown + stemText=[降级]）· 主链路不阻塞 wrongbook create 流程"
        oracle_type: reliability+fallback
        threshold: "happy_path: 主 provider 正常 · GET /ai/analysis → status=completed 含真解析。error_paths.0: WireMock 桩 dashscope 429 连续 10 次 · 自动切 openai · 最终 status=completed 主 provider 降级标记 provider=openai。error_paths.1: 两 provider 都 fail · status=degraded · stemText=[降级] · wrongbook.item.analyzed 仍发出（下游 S5 按降级占位处理）。性能: P95 < 3s 含切换开销（CC-01）。"
        source: "落地计划 §10.5.1（编号修正）· 方案 §2A.8 AI 降级 · §2B.SC-06 · ADR 0008"
        draft_by: ai-planner-s5.5
        draft_at: "2026-04-24T07:25:00+08:00"

  # ============ S5 Phase owner SCs · Q-H 授权 AI 代拟 ============
  - sc_id: SC-07
    title: "艾宾浩斯复习计划生成"
    phase_owner: s5
    acceptance:
      - id: SC-07.AC-1
        statement: "Consumer 消费 wrongbook.item.analyzed 后 · 为每条 wrong_item 幂等创建 7 行 review_plan（node_index 0..6 · 偏移 [2h, 1d, 2d, 4d, 7d, 14d, 30d] · 每行独立 ease_factor=2.5）"
        oracle_type: functional
        threshold: "Consumer 首次消费：review_plan 新增 7 行 · node_index 覆盖 0..6 完整 · next_review_at 按偏移设置 · ease_factor=2.5 · status=active · deleted_at=null。重投同事件：唯一索引 (wrong_item_id, node_index) 冲突拦截 · 行数仍 7。孤儿事件（wrong_item 不存在）：ACK · 不写 plan · metric review_plan_create_orphan_total +1。"
        source: "落地计划 §9.0.5 AC-1（映射 SC-06.AC-1 → SC-07.AC-1 · Q-A 决策）· 方案 §2B.SC-07 · business-analysis.yml SC-07.AC-1"
        draft_by: ai-planner-s5
        draft_at: "2026-04-23T18:10:00+08:00"
      - id: SC-07.AC-2
        statement: "SM2Algorithm.compute 纯函数 · 输入 (ease_factor, interval_days, quality, cfg) → (nextEase, nextInterval) · quality<3 reset 到 cfg.easeInit=2.5 interval=1 · quality≥3 按论文公式 · ease guard-rail ∈ [1.3, 2.5] · interval ≤ cfg.intervalMaxDays=60"
        oracle_type: functional
        threshold: "断言矩阵：(1) quality=5, ease=2.5, interval=0 → nextEase=2.5, nextInterval=1；(2) quality=0, ease=1.3, interval=30 → nextEase=2.5, nextInterval=1（reset）；(3) quality=5, ease=1.3, interval=10 → nextEase=clamp(1.4,1.3,2.5)=1.4, nextInterval=round(10×1.4)=14；(4) quality 非法值 (-1/6) → IllegalArgumentException；(5) 性能：1000 次执行 · 单次 ≤ 10ms（纯函数无 IO）。"
        source: "落地计划 §9.0.5 AC-3 · design/艾宾浩斯.md · ADR 0013 · Q-C/F 决策 · business-analysis.yml SC-07.AC-2"
        draft_by: ai-planner-s5
        draft_at: "2026-04-23T18:10:00+08:00"

  - sc_id: SC-08
    title: "复习任务执行与打分"
    phase_owner: s8
    acceptance:
      - id: SC-08.AC-1
        statement: "POST /review-plans/{id}/complete body {quality: 0-5} · 同事务 UPDATE 当前节点行（乐观锁 dispatch_version）+ INSERT review_outcome + 发 review.completed 事件（Outbox 兜底）· 连续 3 次 ease≥2.8 触发 mastered + 发 review.mastered"
        oracle_type: functional+concurrency
        threshold: "happy_path：plan(ease=2.5, interval=2h) · POST quality=5 → 200 · review_plan 更新 (ease=2.5, interval=1d, next_review_at=+1d) · review_outcome +1 行 · review.completed 事件发出。error：plan 不存在 404；quality=6 返 400（INVALID_QUALITY）；已 mastered 返 410（PLAN_MASTERED）。并发：2 个请求同 plan · 1 个 200 / 1 个 409 · review_outcome 只 +1。mastered：连续 3 次 ease≥2.8 后 · 所有 7 行 status=mastered + deleted_at · 发 review.mastered。性能：100 次 complete · review_complete_p95_ms < 200ms · 409 率 < 1%。"
        source: "落地计划 §9.0.5 AC-2（映射 SC-06.AC-2 → SC-08.AC-1 · Q-A 决策）· 方案 §2B.SC-08 · business-analysis.yml SC-08.AC-1"
        draft_by: ai-planner-s5
        draft_at: "2026-04-23T18:10:00+08:00"

  - sc_id: SC-09
    title: "学情分析卡片（TopN 薄弱项）"
    phase_owner: s8
    acceptance:
      - id: SC-09.AC-1
        statement: "GET /review-stats?range=week|month|quarter&subject=<opt> · 按 X-User-Timezone header 聚合 review_outcome JOIN review_plan + wrong_item · 返回 (data[]:{date,correctRate,masteredCount,reviewCount}, topWeak[]:{subject,totalReview,forgetCount,forgetRate}, warnings[]) · Q-E timezone 降级 + PARTIAL_HISTORY warning"
        oracle_type: functional+performance
        threshold: "happy_path: user tz=Asia/Shanghai 本周 math 10 forget · physics 4 correct · chinese 5 correct → GET ?range=week 返 7 day 数组 + topWeak[0].subject=math + forgetRate=1.0000。error: range=year 返 400 code=40003 INVALID_RANGE；X-User-Timezone=Invalid/ZoneXYZ → 200 · data.timezone=Asia/Shanghai + warnings 含 TIMEZONE_FALLBACK。boundary: 0 次 complete → 7 day 每 day correctRate=null/reviewCount=0/topWeak=[]；range=quarter (90d) 不触发 PARTIAL_HISTORY（仅 > 180d retention 才触发）。性能: 10 次调用平均 < 500ms（staging 10万行再测 P95）。TopN=3 · min_sample=3 过滤小样本。"
        source: "落地计划 §9.0.5 SC-09.AC-1 · 方案 §2B.SC-09 · Q-E 决策 · business-analysis.yml SC-09.AC-1"
        draft_by: ai-planner-s5
        draft_at: "2026-04-24T05:30:00+08:00"

  - sc_id: SC-10
    title: "通用日历节点绑定（复习/自定义）"
    phase_owner: s5
    acceptance:
      - id: SC-10.AC-1
        statement: "CalendarFeignClient 调 calendar-platform core-service GET /calendar/nodes?date= · Sentinel 熔断（超时>3s 或 QPS>500）+ Caffeine 10min TTL cache · core 断且 cache 过期 · /review-plans?date= 返 503 source=unavailable"
        oracle_type: reliability+performance
        threshold: "happy_path: core-service 正常（< 50ms）· Feign 200 · cache 同步写 · response source=fresh。error: core 超时 > 3s → circuit open · 返 fallback cache（staleness ≤ 10min）· metric circuit_open_total +1 · source=cache:Nm；cache 过期且 core 仍断 → 503 · meta.source=unavailable · error_code=CALENDAR_DEPENDENCY_DOWN。并发: 1000 QPS · Sentinel QPS 500 阈值生效 · 超出 429 · core 不被打挂。性能: 1000 次调用 P95 < 50ms（含 cache 命中）· cache hit rate ≥ 80%。"
        source: "落地计划 §9.2 外部依赖 · 方案 §2A.6 · business-analysis.yml SC-10.AC-1"
        draft_by: ai-planner-s5
        draft_at: "2026-04-23T18:10:00+08:00"

  # ============ S6 Phase owner · 2026-04-24 AI 代拟（Q-H 授权）============
  - sc_id: SC-11
    title: "错题图片 OSS 上传与压缩"
    phase_owner: s6
    acceptance:
      - id: SC-11.AC-1
        statement: "POST /files/presign body {filename, mime, size} → 返回 {uploadUrl, fileKey, expiresAt, ttlSeconds}。MIME ∈ {image/jpeg, image/png, image/heic, image/webp}（白名单）· size ≤ 10MB · TTL ≤ 900s · fileKey 扁平 UUID.ext 避免 @PathVariable 多段解析。FEATURE_STORAGE_PROVIDER 切换 MinIO (默认) / OSS (Q-B Stub)。"
        oracle_type: functional
        threshold: "happy_path: POST · 返 200 · ttlSeconds ≤ 900 · fileKey 不含 / 且以 .jpg/.png/.heic 结尾。error_paths.0: mime=application/exe → 400 code=40001 MIME_NOT_ALLOWED。error_paths.1: size=20MB → 400（@Max body 校验）。boundary: size=5MB（分片阈值边界）→ 200 不触发分片。"
        source: "落地计划 §10.1 A4 A5 · S6 business-analysis SC-11.AC-1 · FileUploadIT scenario_sc11_ac1_*"
        draft_by: ai-planner-s6
        draft_at: "2026-04-24T06:00:00+08:00"
      - id: SC-11.AC-2
        statement: "POST /files/complete/{fileKey} · 同步链路：读 MinIO 原图 → AntivirusClient.scan (ClamStub CLEAN) → ImageProcessor (thumbnailator 缩放 ≤ 1920px + webp q=85 + metadata-extractor EXIF strip) → putObject 回写 thumb/medium → UPDATE file_asset.status=READY + variant_{thumb,medium}_key"
        oracle_type: functional+compliance
        threshold: "happy_path: presign + PUT 后 complete · 返 200 · body.data.status=READY · variantThumbKey/MediumKey 非空 startsWith variants/ · DB file_asset.status=READY。webp 产物魔数 RIFF · hasSensitiveExif=false（GPS/Make/Model 命中 0 · 合规 · 儿童地理位置不可泄漏）。error_paths.0: 不存在 fileKey → 404 FILE_NOT_FOUND。error_paths.1: AntivirusClient 返 INFECTED → 422 VIRUS_DETECTED + status=QUARANTINED。"
        source: "落地计划 §10.1 A3 A4 · S6 business-analysis SC-11.AC-2 · FileUploadIT scenario_sc11_ac2_*"
        draft_by: ai-planner-s6
        draft_at: "2026-04-24T06:00:00+08:00"
      - id: SC-11.AC-3
        statement: "GET /files/download/{fileKey}?variant=thumb|medium|original → 返回 {downloadUrl, variant, ttlSeconds}。downloadUrl TTL ≤ 900s · 未指定 variant 默认 medium · fileKey 软删（deleted_at 非空）→ 410 Gone"
        oracle_type: functional
        threshold: "happy_path: GET · 返 200 · downloadUrl 非空 · variant=medium（默认）· ttlSeconds=900。"
        source: "落地计划 §10.1 A5 A7 · S6 business-analysis SC-11.AC-3 · FileUploadIT scenario_sc11_ac3_*"
        draft_by: ai-planner-s6
        draft_at: "2026-04-24T06:00:00+08:00"

