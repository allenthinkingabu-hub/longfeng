  - sc_id: SC-07
    title: "艾宾浩斯复习计划生成"
    phase_owner: s5
    acceptance:
      - id: SC-07.AC-1
        statement: "Consumer 消费 wrongbook.item.analyzed 后 · 为每条 wrong_item 幂等创建 7 行 review_plan（node_index 0..6 · 偏移 [2h, 1d, 2d, 4d, 7d, 14d, 30d] · 每行独立 ease_factor=2.5）"
        oracle_type: functional
        threshold: "Consumer 首次消费：review_plan 新增 7 行 · node_index 覆盖 0..6 完整 · next_review_at 按偏移设置 · ease_factor=2.5 · status=active · deleted_at=null。重投同事件：唯一索引 (wrong_item_id, node_index) 冲突拦截 · 行数仍 7。孤儿事件（wrong_item 不存在）：ACK · 不写 plan · metric review_plan_create_orphan_total +1。"
        source: "落地计划 §9.0.5 AC-1（映射 SC-06.AC-1 → SC-07.AC-1 · Q-A 决策）· 方案 §2B.SC-07 · business-analysis.yml SC-07.AC-1"
        draft_by: ai-planner-s5
        draft_at: "2026-04-23T18:10:00+08:00"
      - id: SC-07.AC-2
        statement: "SM2Algorithm.compute 纯函数 · 输入 (ease_factor, interval_days, quality, cfg) → (nextEase, nextInterval) · quality<3 reset 到 cfg.easeInit=2.5 interval=1 · quality≥3 按论文公式 · ease guard-rail ∈ [1.3, 2.5] · interval ≤ cfg.intervalMaxDays=60"
        oracle_type: functional
        threshold: "断言矩阵：(1) quality=5, ease=2.5, interval=0 → nextEase=2.5, nextInterval=1；(2) quality=0, ease=1.3, interval=30 → nextEase=2.5, nextInterval=1（reset）；(3) quality=5, ease=1.3, interval=10 → nextEase=clamp(1.4,1.3,2.5)=1.4, nextInterval=round(10×1.4)=14；(4) quality 非法值 (-1/6) → IllegalArgumentException；(5) 性能：1000 次执行 · 单次 ≤ 10ms（纯函数无 IO）。"
        source: "落地计划 §9.0.5 AC-3 · design/艾宾浩斯.md · ADR 0013 · Q-C/F 决策 · business-analysis.yml SC-07.AC-2"
        draft_by: ai-planner-s5
        draft_at: "2026-04-23T18:10:00+08:00"

  - sc_id: SC-08
    title: "复习任务执行与打分"
    phase_owner: s8
    acceptance:
      - id: SC-08.AC-1
        statement: "POST /review-plans/{id}/complete body {quality: 0-5} · 同事务 UPDATE 当前节点行（乐观锁 dispatch_version）+ INSERT review_outcome + 发 review.completed 事件（Outbox 兜底）· 连续 3 次 ease≥2.8 触发 mastered + 发 review.mastered"
        oracle_type: functional+concurrency
        threshold: "happy_path：plan(ease=2.5, interval=2h) · POST quality=5 → 200 · review_plan 更新 (ease=2.5, interval=1d, next_review_at=+1d) · review_outcome +1 行 · review.completed 事件发出。error：plan 不存在 404；quality=6 返 400（INVALID_QUALITY）；已 mastered 返 410（PLAN_MASTERED）。并发：2 个请求同 plan · 1 个 200 / 1 个 409 · review_outcome 只 +1。mastered：连续 3 次 ease≥2.8 后 · 所有 7 行 status=mastered + deleted_at · 发 review.mastered。性能：100 次 complete · review_complete_p95_ms < 200ms · 409 率 < 1%。"
        source: "落地计划 §9.0.5 AC-2（映射 SC-06.AC-2 → SC-08.AC-1 · Q-A 决策）· 方案 §2B.SC-08 · business-analysis.yml SC-08.AC-1"
        draft_by: ai-planner-s5
        draft_at: "2026-04-23T18:10:00+08:00"

  - sc_id: SC-09
    title: "学情分析卡片（TopN 薄弱项）"
    phase_owner: s8
    acceptance:
      - id: SC-09.AC-1
        statement: "GET /review-stats?range=week|month|quarter&subject=<opt> · 按 X-User-Timezone header 聚合 review_outcome JOIN review_plan + wrong_item · 返回 (data[]:{date,correctRate,masteredCount,reviewCount}, topWeak[]:{subject,totalReview,forgetCount,forgetRate}, warnings[]) · Q-E timezone 降级 + PARTIAL_HISTORY warning"
        oracle_type: functional+performance
        threshold: "happy_path: user tz=Asia/Shanghai 本周 math 10 forget · physics 4 correct · chinese 5 correct → GET ?range=week 返 7 day 数组 + topWeak[0].subject=math + forgetRate=1.0000。error: range=year 返 400 code=40003 INVALID_RANGE；X-User-Timezone=Invalid/ZoneXYZ → 200 · data.timezone=Asia/Shanghai + warnings 含 TIMEZONE_FALLBACK。boundary: 0 次 complete → 7 day 每 day correctRate=null/reviewCount=0/topWeak=[]；range=quarter (90d) 不触发 PARTIAL_HISTORY（仅 > 180d retention 才触发）。性能: 10 次调用平均 < 500ms（staging 10万行再测 P95）。TopN=3 · min_sample=3 过滤小样本。"
        source: "落地计划 §9.0.5 SC-09.AC-1 · 方案 §2B.SC-09 · Q-E 决策 · business-analysis.yml SC-09.AC-1"
        draft_by: ai-planner-s5
        draft_at: "2026-04-24T05:30:00+08:00"

