# 落地计划 §1.9 Test Oracle Contract · 独立签字文件
# S0 落空白模板 · 15 SC 占位 · cross_cutting CC-01/CC-02 骨架
#
# 硬约束：
#   - V-S0-13：signed_by 必须为空字符串（S0 禁止预签 · 由各 Phase DoR 前 User 独立签）
#   - Builder Agent 永远不改本文件（只读）· 若发现 AC 歧义 · Builder 提 issue → User 修订 yml → 重签
#   - 每个 Phase DoR 校验：check-oracle-source.sh <phase> --phase-ac 必须绿
#   - 每个 Phase DoD 校验：check-oracle-source.sh <phase> --assertions 扫阈值必须 100% 归位
#
# 签字方式（User 独立执行 · 在各 Phase DoR 前完成）：
#   1. 填每条 AC 的 threshold 与 source 字段
#   2. 填 signed_by (@github-handle) + signed_at (ISO 8601) + signature_method
#   3. 通过 GitHub PR 合并（signature_method: github-pr-approve）或本地 GPG 签章
#
# 2026-04-23 · Q-H 授权例外：User 同意 Planner Agent 为 SC-07/08/09/10 代拟 acceptance[]（draft_by 字段标示）
#   · 草案 AI 代笔 · signed_by/signed_at 仍等 User 最终签
#   · Planner 不是 Builder · Q-H 属 G-Biz 决策范围的授权豁免
#   · 参见 reports/retrofit/s1-plan.md 样式（plan-first 原则）→ User 审本文件 draft 通过后签

schema_version: 1.0

signed_by: "@allen"                  # 2026-04-24 · S5/S6/S5.5 Phase AC 多轮审签
signed_at: "2026-04-24T07:30:00+08:00"
signature_method: "in-person"        # 多轮 User 直接回复 · S5 SC-07/08/09/10 + S6 SC-11 + S5.5 SC-05/06 AI 代拟 全量核准

