    downstream_contract:
      - { to_phase: s3, api: "POST /wrongbook/items · 含 image_id=fileKey 引用" }
    four_role_slots:
      architect_anchor: "design/arch/s7-frontend-wrongbook.md §1.2/§8.1 录入三入口 + 草稿状态机 + ADR 0014"
