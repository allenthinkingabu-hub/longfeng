    upstream_contract: []
    downstream_contract:
      - { to_phase: s3, api: "DELETE /wrongbook/items/{id} · 后端 deleted_at = now + 发 audit 事件" }
      - { to_phase: s3, api: "POST /wrongbook/items/{id}/restore · 恢复（7d 内）· 本 Phase UI 仅占位 · Settings 页落地可留 S11" }
    four_role_slots:
      architect_anchor: "design/arch/s7-frontend-wrongbook.md §8.4 · 软删除确认态 + 列表过滤逻辑"
      dev_anchor: "frontend/apps/h5/src/pages/Detail/index.tsx（delete 按钮）+ api-contracts/src/clients/wrongbook.ts（delete 方法）"
      qa_anchor: "Detail.test.tsx 追加 delete-confirm testid 点击 · mock DELETE 200 · 跳回 list"
      ux_anchor: "Sd.3 P07-wrongbook-detail 右上 更多菜单（design/mockups/wrongbook/06_wrongbook_detail.html）· testid: wrongbook.detail.delete.btn / wrongbook.detail.delete.confirm"
    risks:
      - "恢复 UI 未在本 Phase · User 操作 → 7d 后无法恢复（产品风险 · S11 Settings 页补）"

  - ac_id: SC-11.AC-1
    title: "错题图片 OSS 上传 · 前端交互 · 走 S6 file-service 预签名 + PUT OSS + complete（前端不经业务服务）· s5.5 chain-03 已绿"
    domain_entities: [UploadReceipt, FileAsset]
    user_journey: "Capture 页触发 → POST /files/presign → PUT upload_url binary → POST /files/complete/{fileKey} → status=READY"
    upstream_contract:
      - { from_phase: s6, api: "POST /files/presign · MIME 白名单 · size ≤ 10MB · TTL 900s" }
      - { from_phase: s6, api: "PUT {uploadUrl} · 前端直传 · 不过网关" }
      - { from_phase: s6, api: "POST /files/complete/{fileKey} · webp + EXIF strip + scan · status=READY" }
    downstream_contract: []
    four_role_slots:
      architect_anchor: "design/arch/s7-frontend-wrongbook.md §8.5 · 直传 OSS · MIME/size 守门 · S6 fileKey 语义引用"
      dev_anchor: "frontend/packages/api-contracts/src/clients/files.ts（filesClient.presign/directUpload/complete）· Capture 页 useMutation 消费"
      qa_anchor: "Capture.test.tsx（mock filesClient · 验 upload-progress testid）· 实际 E2E 走 s5.5 chain-03 BackendChainIT 端到端"
      ux_anchor: "Sd.3 P03-capture · testid: capture.upload-progress / capture.size-exceeded.toast / capture.file-ok"
    risks:
      - "filesClient.directUpload 用 fetch（非 httpClient · 合理例外 · 前端直传 OSS 不过网关）"

  - ac_id: SC-15.AC-1
    title: "学科标签层级（subject.tag 两级）· H5 Picker + miniapp van-picker · Tag Sheet 联动学科池"
    domain_entities: [TagTaxonomy, Subject, WrongItemTag]
    user_journey: "Capture / List filter / Detail Tag Sheet 均消费同一 subject 枚举（math/physics/chemistry/english）· 未来 s3 可扩为 subject.tag 两级（本 Phase UI 预留）"
    upstream_contract:
      - { from_phase: s3, api: "GET /wrongbook/tags · 学科白名单 · 未来扩 tag_taxonomy" }
    downstream_contract: []
    four_role_slots:
      architect_anchor: "design/arch/s7-frontend-wrongbook.md §8.6 · subject 常量表 + Tag 编辑面板字段绑定"
      dev_anchor: "frontend/apps/h5/src/pages/Capture/index.tsx subject Picker + List filter Picker + Detail SUBJECT_POOL · miniapp 同一常量 subjectOptions"
      qa_anchor: "3 页 test 均验 subject 选项渲染（覆盖 Capture.test / List.test / Detail.test）"
      ux_anchor: "Sd.3 P03/P06/P07 · testid: capture.form.subject / wrongbook.list.filter-subject / wrongbook.detail.tag-chip"
    risks:
