    downstream_contract:
      - { to_phase: s3, api: "PATCH /wrongbook/items/{id}/tags · If-Match version · 412 则 refetch merge" }
    four_role_slots:
      architect_anchor: "design/arch/s7-frontend-wrongbook.md §8.2 · Tag 状态机（idle/editing/saving/412-merge）"
      dev_anchor: "frontend/apps/h5/src/pages/Detail/index.tsx（Sheet 组件）+ miniapp detail.ts（van-popup）"
      qa_anchor: "Detail.test.tsx · 跑 wrongbookDetail.tag-sheet/tag-chip/tag-save testid 存在"
