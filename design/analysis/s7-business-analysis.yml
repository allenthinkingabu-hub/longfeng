    domain_entities: [AIExplainStream, AnalysisView]
    user_journey: "P07-DETAIL → useQuery 拉 item → 并发 useQuery similar × SSE explainStream → 分片累加到 aria-live 区域"
    upstream_contract:
      - { from_phase: s4, api: "SSE GET /analysis/{itemId} · chunked text deltas" }
      - { from_phase: s4, api: "GET /analysis/{itemId}/similar?k=3 · 并发 useQuery" }
    downstream_contract: []
    four_role_slots:
      architect_anchor: "design/arch/s7-frontend-wrongbook.md §8.3 · SSE 客户端 · 微信 enableChunked 降级 · reconnect ≤ 3"
      dev_anchor: "frontend/apps/h5/src/pages/Detail/index.tsx（analysisClient.explainStream EventSource）+ miniapp detail.ts（wx.request enableChunked onChunkReceived）"
      qa_anchor: "Detail.test.tsx（mock analysisClient · 验 explain-stream testid aria-live）"
      ux_anchor: "Sd.3 P07-wrongbook-detail · testid: wrongbook.detail.explain-stream / wrongbook.detail.similar-card"
    risks:
      - "微信小程序无原生 EventSource · wx.request chunk 解析稳定性"
      - "SSE 断连后的断点续传语义未标准化"

