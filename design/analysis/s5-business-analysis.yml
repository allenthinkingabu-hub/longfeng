  # ============ SC-10 · 通用日历节点绑定（s5 主产出）============
  - ac_id: "SC-10.AC-1"
    title: "review_plan 绑定 calendar_node · Feign 调 calendar-platform core-service · Sentinel 熔断 + Caffeine 10min fallback"
    statement: "AI 拟：S5 通过 CalendarFeignClient 调 calendar-platform core-service GET /calendar/nodes?date=YYYY-MM-DD · 用 @SentinelResource + Caffeine 10min TTL cache 兜底。core-service 超时 > 3s → circuit open → 返 fallback cache。cache 过期且 core-service 仍断 → /review-plans?date= 返 503 · source=unavailable。"
    source: "落地计划 §9.2 外部依赖 · 方案 §2A.6 / §2B.SC-10"
    critical: true
    critical_reason: "合规 · 儿童日程数据跨服务流转 · Feign 调用必须带熔断 + 降级占位 · 防雪崩"
    domain_entities: [ReviewPlan, CalendarNode, FeignClient]
    upstream_contract: []
