narrative: |
  S5 是 AI 错题本项目的"复习节奏节拍器" —— review-plan-service 后端服务。按 G-Biz 8 决策收口：

  【数据模型 · Q-B/F】每条错题 analyzed 事件触发 Consumer 幂等 INSERT 7 行 review_plan（node_index 0..6 ·
  偏移 [2h, 1d, 2d, 4d, 7d, 14d, 30d]）· 每行独立 ease_factor=2.5 / interval_days={0,1,2,4,7,14,30}。

  【SM-2 算法 · Q-C】每次 complete 当前节点调 SM2Algorithm.compute(easeBefore, intervalBefore, quality) →
  quality<3 reset ease=2.5/interval=1 · quality≥3 按论文公式微调 · guard-rail ease ∈ [1.3, 2.5]。
  complete 只 UPDATE 当前 node_index 行 · 不级联后续。

  【时间策略 · Q-D/E】库内 timestamptz UTC 存储 · 前端按 user_profile.timezone 渲染 ·
  T0 节点 next_review_at = now() + 2h（Consumer 侧 · 用户当地时间）· GET /review-plans?date= 按 header
  X-User-Timezone 解析聚合边界（默认 Asia/Shanghai）。

  【Mastered 触发 · Q-G】complete 时聚合查该 wrong_item 最近 3 次 review_outcome · 若连续 3 次 ease≥2.8 ·
  置所有 7 行 plan status=mastered + deleted_at=now() · 发 review.mastered 事件。

  【SC 归属 · Q-A】SC-07 (s5 主) · SC-10 (s5 主) · SC-08/09 (s8 主 · S5 提供后端能力)。
  主执行档 §9 的 SC-06/09 锚点留 TODO 下次迭代修正。

  【S→S8 契约冻结】review.completed / review.due / review.mastered 事件 schema + GET /review-plans,
  GET /review-stats, POST /review-plans/{id}/complete 五条契约是 S5→S8 的硬边界 · 任何变更需 ADR + G-Arch 重审。

  本 Phase 不负责：错题录入（S3）· AI 解析（S4）· 通知推送（notification-service via S6）·
  前端 UI（S7/S8）· 匿名态（S11）· 家长监督视图的复习聚合视图（S5 仅提供 API · S8 做视图）。

ac_coverage:
  # ============ SC-07 · 艾宾浩斯复习计划生成（s5 主产出）============
  - ac_id: "SC-07.AC-1"
    title: "Consumer 消费 wrongbook.item.analyzed · 幂等 INSERT 7 行 review_plan(node_index 0..6)"
    statement: "AI 拟：消费 S4 发出的 wrongbook.item.analyzed 事件后 · Consumer 必须幂等为每条 wrong_item 创建恰好 7 行 review_plan（node_index 0..6 · 偏移 [2h, 1d, 2d, 4d, 7d, 14d, 30d]）· 每行 ease_factor=2.5 / interval_days=对应偏移 / status=active / next_review_at=按用户 timezone 计算。重投事件须由唯一索引 (wrong_item_id, node_index) 兜底 · 不双写。"
    source: "落地计划 §9.0.5 骨架 AC-1（映射：骨架 SC-06.AC-1 → SC-07.AC-1 · Q-A 决策）· 方案 §2B.SC-07 · Q-B/F 决策"
    critical: true
    critical_reason: "并发 · 消费者幂等（S4 重放场景）· 错写多条 plan 会扭曲用户复习节奏 · 儿童教育数据触发"
    domain_entities: [ReviewPlan, WrongItem, SM2State]
    upstream_contract:
      - "from_phase: s4 · event: wrongbook.item.analyzed · payload {itemId, userId, subject, analyzedAt}"
    downstream_contract:
      - "to_phase: s8 · api: GET /review-plans?date=YYYY-MM-DD · 返回当日 due 节点列表"
    user_journey: "S4 发 wrongbook.item.analyzed → S5 Consumer 按 wrong_item_id 幂等检查 → 一事务 INSERT 7 行 review_plan(node_index 0..6 · 偏移 [2h,1d,2d,4d,7d,14d,30d])"
    four_role_slots:
      architect_anchor: "design/arch/s5-review-plan.md ## AC: SC-07.AC-1 · §1 领域模型 · §2 数据流 · ADR 0013"
      dev_anchor: ""
      qa_anchor: ""
      observable_behavior_anchor: "metric review_plan_create_total{status,outcome} · consumer offset · Prometheus"
    risks:
      - "S4 事件幂等键与 S5 Consumer 幂等键不一致 → 重放可能双写（唯一索引 (wrong_item_id, node_index) 兜底）"
      - "INSERT 7 行事务内 · 若 DB 连接池紧张可能超时 · 需 batchInsert + hikari pool size ≥ 20"
    verification_matrix:
      happy_path:
        - id: "happy_path.0"
          given: "S4 推 wrongbook.item.analyzed(itemId=1001, userId=42, subject=math, analyzedAt=2026-04-23T10:00:00Z)"
          when: "Consumer 消费该事件"
          then: "review_plan 新增 7 行 · node_index 0..6 · status=active · ease_factor=2.5 · next_review_at 按偏移设置（T0=10:00+2h=12:00）"
      error_paths:
        - id: "error_paths.0"
          given: "Consumer 消费事件时 wrong_item_id 不存在（上游孤儿事件）"
          when: "Consumer 调 Feign 查 wrongbook-service 返回 404"
          then: "记 warn 日志 · ACK 事件（不重试 · 不写 plan）· metric review_plan_create_orphan_total +1"
      boundary:
        - id: "boundary.0"
          given: "Consumer 消费同一 wrongbook.item.analyzed 事件两次（MQ 重投）"
          when: "第二次 Consumer 尝试 INSERT"
          then: "唯一索引 (wrong_item_id, node_index) 冲突 → ON CONFLICT DO NOTHING · 计数不变"
      observable:
        - id: "observable.0"
          given: "happy_path.0 触发后"
          when: "查 metric review_plan_create_total{outcome=success}"
          then: "计数 +7 · consumer offset 前进 · p95 创建延迟 < 100ms"
      visual: []

  - ac_id: "SC-07.AC-2"
    title: "节点独立 SM-2 · 每节点持有独立 ease/interval · compute guard-rail"
    statement: "AI 拟：SM2Algorithm 纯函数 · 输入 (easeFactor, intervalDays, quality, cfg) · 输出 (nextEaseFactor, nextIntervalDays)。quality<3 时 nextEaseFactor=cfg.easeInit(2.5) / nextIntervalDays=1；quality≥3 时 nextEaseFactor = clamp(easeFactor + (0.1 - (5-q)*(0.08 + (5-q)*0.02)), cfg.easeMin(1.3), cfg.easeMax(2.5)) · nextIntervalDays = min(cfg.intervalMaxDays(60), round(intervalDays * nextEaseFactor))。首次（intervalDays=0）→ nextIntervalDays=1。"
    source: "落地计划 §9.0.5 骨架 AC-3 · design/艾宾浩斯.md · ADR 0013 · Q-C/F 决策"
    critical: false
    critical_reason: ""
    domain_entities: [SM2State, AlgorithmConfig]
    upstream_contract: []
    downstream_contract:
      - "to_phase: s8 · storage: T0-T6 节点独立 ease/interval · 仅供 S8 可视化"
    user_journey: "纯函数 SM2Algorithm.compute(ease, interval, quality, cfg) → (nextEase, nextInterval) · 由 ReviewPlanService.complete 调用"
    four_role_slots:
      architect_anchor: "design/arch/s5-review-plan.md ## AC: SC-07.AC-2 · §1.3 SM-2 vs 固定间隔"
      dev_anchor: ""
      qa_anchor: ""
      observable_behavior_anchor: "pure fn SM2Algorithm · PBT 属性测试 (ease, interval, quality) 三元组 · unit test ≥ 20 case"
    risks:
      - "AlgorithmConfig 阈值（ease_min/max/init · intervalMaxDays）硬编码 = 禁止 · 必须走 @ConfigurationProperties"
    verification_matrix:
      happy_path:
        - id: "happy_path.0"
          given: "首次复习（interval=0 · ease=2.5）· quality=5"
          when: "SM2Algorithm.compute"
          then: "nextInterval=1d · nextEase=clamp(2.6, 1.3, 2.5)=2.5（顶板夹）"
      error_paths:
        - id: "error_paths.0"
          given: "quality 非法值（-1 或 6）"
          when: "SM2Algorithm.compute"
          then: "抛 IllegalArgumentException"
      boundary:
        - id: "boundary.0"
          given: "ease 已在地板 1.3 · quality=0"
          when: "SM2Algorithm.compute"
          then: "nextEase=2.5（quality<3 reset · Q-C）· nextInterval=1"
        - id: "boundary.1"
          given: "interval 已 60d（顶板）· quality=5"
          when: "SM2Algorithm.compute"
          then: "nextInterval=60（不再上升 · intervalMaxDays 夹）"
      observable:
        - id: "observable.0"
          given: "算法执行 ≥ 1000 次"
          when: "采样性能"
          then: "单次 ≤ 10ms（纯函数 · 无 IO）"
      visual: []

  # ============ SC-08 · 复习任务执行与打分（s8 主 · s5 提供后端能力）============
  - ac_id: "SC-08.AC-1"
    title: "POST /review-plans/{id}/complete · 节点独立 SM-2 + 乐观锁 + review.completed 事件"
    statement: "AI 拟：前端调 POST /review-plans/{id}/complete body {quality: 0-5} · 后端同事务：(1) 加行锁读 plan 当前 ease/interval/dispatch_version；(2) 调 SM2Algorithm.compute；(3) UPDATE review_plan SET ease_factor=?, interval_days=?, next_review_at=now()+interval, completed_at=now(), dispatch_version=dispatch_version+1 WHERE id=? AND dispatch_version=?（乐观锁）；(4) INSERT review_outcome 1 行（quality + easeBefore/After + intervalBefore/After）；(5) 发 review.completed RocketMQ 事件 · 走 Outbox 兜底。乐观锁冲突返回 409。"
    source: "落地计划 §9.0.5 骨架 AC-2 · 方案 §2B.SC-08 · Q-C/F/G 决策"
    critical: true
    critical_reason: "并发 · 乐观锁冲突在高并发下需监控 · 涉用户复习进度记录正确性 · 未成年人数据"
    domain_entities: [ReviewPlan, ReviewEvent, ReviewOutcome, SM2State]
    upstream_contract:
      - "from_phase: s8 · api: POST /review-plans/{id}/complete body {quality: 0-5}"
    downstream_contract:
      - "to_phase: s8 · event: review.completed · payload {planId, quality, nextReviewAt, easeFactorAfter}"
      - "to_phase: s8 · event: review.mastered · 连续 3 次 ease≥2.8 触发（Q-G · 通过 aggregate 本 wrong_item 最近 3 次 outcome 判定）"
    user_journey: "S8 用户自评 → POST complete → ReviewPlanService.complete 事务（UPDATE 当前节点 + INSERT outcome + 发 completed 事件 + 可能发 mastered）"
    four_role_slots:
      architect_anchor: "design/arch/s5-review-plan.md ## AC: SC-08.AC-1 · §2 complete 事务 · §3 event sourcing"
      dev_anchor: ""
      qa_anchor: ""
      observable_behavior_anchor: "OpenAPI POST /review-plans/{id}/complete · metric review_complete_p95_ms · review_complete_conflict_total · histogram review_quality_distribution"
    risks:
      - "乐观锁冲突率（dispatch_version）高并发 > 1% 需告警 · 阈值进 S10"
      - "Outbox 兜底事件未发出时 · review.completed 消费方（S8 前端投票）看不到结果 · 需 S10 补偿 job"
    verification_matrix:
      happy_path:
        - id: "happy_path.0"
          given: "已存在 active plan (id=P1, node=0, ease=2.5, interval=2h)"
          when: "POST /review-plans/P1/complete {quality: 5}"
          then: "返回 200 · review_plan 更新（ease=2.5, interval=1d, next_review_at=+1d）· review_outcome +1 · review.completed 事件发出"
      error_paths:
        - id: "error_paths.0"
          given: "plan 不存在或已 mastered（deleted_at != NULL）"
          when: "POST /review-plans/9999/complete"
          then: "返回 404 · 无副作用"
        - id: "error_paths.1"
          given: "body quality=6（越界）"
          when: "POST /review-plans/P1/complete {quality: 6}"
          then: "返回 400 · 校验失败 · 错误码 INVALID_QUALITY"
        - id: "error_paths.2"
          given: "连续 3 次 ease≥2.8 触发 mastered · POST 第 4 次"
          when: "POST /review-plans/P1/complete {quality: 5}"
          then: "返回 410 Gone · 错误码 PLAN_MASTERED · review.mastered 事件已在第 3 次发出"
      boundary:
        - id: "boundary.0"
          given: "两个并发请求同时 POST complete 同一 plan"
          when: "乐观锁冲突"
          then: "其中一个返回 409 Conflict · 另一个成功 · 不出现双写 review_outcome"
        - id: "boundary.1"
          given: "连续 3 次 complete 且 ease 每次都 ≥2.8"
          when: "第 3 次 POST"
          then: "触发 mastered · UPDATE 所有 7 行 plan status=mastered + deleted_at · 发 review.mastered 事件"
      observable:
        - id: "observable.0"
          given: "100 次 complete 请求"
          when: "查 P95"
          then: "review_complete_p95_ms < 200ms · 409 率 < 1%"
      visual: []

