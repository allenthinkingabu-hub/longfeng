  - code: Q-B
    kind: data_model
    decision: "混合 7 行骨架 + SM-2 节点独立微调"
    detail: "Consumer 消费 analyzed 事件 → 一次性 INSERT 7 行（node_index 0..6 · 偏移 [0=2h, 1d, 2d, 4d, 7d, 14d, 30d]）· 每行独立 ease_factor/interval_days · complete 当前节点只 UPDATE 该行（不级联后续）· 后续节点 next_review_at 在它们被 complete 时按自身 ease/interval 现场 SM-2 算"
  - code: Q-C
    kind: algorithm_branch
    decision: "SM-2 论文标准 · quality<3 reset 到 2.5"
    detail: "quality<3 时 nextEaseFactor=2.5 · nextIntervalDays=1。算法 guard-rail：ease ∈ [1.3, 2.5] clamp。"
  - code: Q-D
    kind: t0_timing
    decision: "T0 = 创建后 2h（按用户 timezone · 见 Q-E）"
    detail: "Consumer 消费 analyzed 事件时 · node_index=0 的 next_review_at = now() + 2h（用户当地时间）"
  - code: Q-E
    kind: tz_policy
    decision: "user_profile.timezone"
    detail: "库存 UTC · 前端按 user_profile.timezone 渲染 · GET /review-plans?date= 后端按 request header X-User-Timezone 或 JWT claim 解析 · 默认 Asia/Shanghai。"
  - code: Q-F
    kind: hybrid_semantic
    decision: "节点独立 SM-2"
    detail: "7 行每行独立持有 ease_factor / interval_days · complete 当前节点只 UPDATE 该行。不级联调整后续节点 · 简化事务范围。"
  - code: Q-G
    kind: mastered_threshold
    decision: "连续 3 次 & ease≥2.8"
    detail: "consecutiveGoodCount >= 3 && easeFactor >= 2.8 → status=mastered + deleted_at=now() + 发 review.mastered 事件"
  - code: Q-H
    kind: oracle_signing
    decision: "AI 代拟 threshold 待 User 审签"
    detail: "AI 按本 YAML ac_coverage 为 SC-07/08/09/10 拟 acceptance[] · draft_by: ai-planner-s5 · User 在 acceptance-criteria-signed.yml 顶部签 signed_by/signed_at/signature_method"

